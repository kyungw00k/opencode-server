name: Publish GHCR Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name fallback
        id: image_params
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${IMAGE_NAME:-opencode-server}"
          image="${image,,}"
          image="$(echo "${image}" | sed 's#[^a-z0-9._/-]#-#g')"
          image="$(echo "${image}" | sed 's#^/*##; s#/*$##')"
          if [ -z "${image}" ]; then
            image="opencode-server"
          fi
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Print image target
        run: |
          echo "Publishing image: ${REGISTRY}/${{ steps.image_params.outputs.owner }}/${{ steps.image_params.outputs.image }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_params.outputs.owner }}/${{ steps.image_params.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
